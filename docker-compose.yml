services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    environment:
      DB_PATH: /data/kennel.db
      CONFIG_DIR: /config
      SECRET_KEY: "${KMS_SECRET_KEY:?KMS_SECRET_KEY must be set (generate with: openssl rand -hex 32)}"
      SMTP_PASSWORD: "${KMS_SMTP_PASSWORD:?KMS_SMTP_PASSWORD must be set}"
      RECEIPTS_DIR: /tmp/receipts
      REPORTS_DIR: /tmp/reports
      CORS_ORIGINS: "${KMS_CORS_ORIGINS:-http://kennel.soaringheights.local}"
      LOG_LEVEL: "${KMS_LOG_LEVEL:-INFO}"
      KMS_INIT_DB: "${KMS_INIT_DB:-0}"
    volumes:
      - ./config:/config:ro
      - kennel_data:/data
      - ${NAS_BACKUP_PATH:-/tmp/kennel_backups}:/mnt/nas
    ports:
      - "127.0.0.1:9101:9101"
    networks:
      - kms_net

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "9100:9100"
    networks:
      - kms_net

volumes:
  kennel_data:

networks:
  kms_net:
    driver: bridge
