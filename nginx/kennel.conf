# Soaring Heights KMS — Nginx virtual host
# Drop this file into /etc/nginx/sites-available/ and symlink to sites-enabled/
# Then: nginx -s reload
#
# Requires local DNS: kennel.soaringheights.local -> R630 IP

server {
    listen 80;
    server_name kennel.soaringheights.local kennel.home kennel;

    # Frontend
    location / {
        proxy_pass         http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection keep-alive;
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Backend API
    location /api/ {
        proxy_pass         http://127.0.0.1:9101;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Swagger UI (backend serves at /docs)
    location /docs {
        proxy_pass http://127.0.0.1:9101/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:9101/openapi.json;
        proxy_set_header Host $host;
    }
}
